<!DOCTYPE html>
<html>
<head>
  <title>YEWKIE'S Virtual Gallery</title>

  <style>

    body{
      margin:0;
      background:black;
      overflow:hidden;
      font-family:monospace;
      color:white;
    }

    .noise{
      position:fixed;
      inset:0;

      background:
      repeating-radial-gradient(
      circle,
      rgba(255,255,255,0.08) 1px,
      transparent 2px);

      opacity:0.07;
      pointer-events:none;

      animation:static 0.2s infinite;
    }

    @keyframes static{

      0%{
        transform:translate(0,0);
      }

      50%{
        transform:translate(-8px,5px);
      }

      100%{
        transform:translate(5px,-8px);
      }

    }

    .hero{
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;

      background:
      radial-gradient(circle at center,
      rgba(100,100,100,0.12),
      transparent 40%),
      linear-gradient(to bottom,
      #080808,
      #000);

      position:relative;
      padding:20px;
    }

    .box{
      border:1px solid rgba(255,255,255,0.15);

      padding:60px 40px;

      background:rgba(255,255,255,0.03);

      backdrop-filter:blur(3px);

      max-width:700px;
    }

    h1{
      font-size:60px;
      letter-spacing:10px;
      margin:0;

      animation:flicker 2s infinite;
    }

    @keyframes flicker{

      0%,100%{
        opacity:1;
      }

      45%{
        opacity:0.4;
      }

      50%{
        opacity:0.1;
      }

      55%{
        opacity:0.9;
      }

    }

    .subtitle{
      margin-top:20px;

      color:#888;

      letter-spacing:3px;

      font-size:14px;
    }

    .enter{

      display:inline-block;

      margin-top:40px;

      padding:15px 35px;

      border:1px solid white;

      color:white;

      text-decoration:none;

      letter-spacing:3px;

      transition:0.3s;
    }

    .enter:hover{

      background:white;
      color:black;

      filter:blur(1px);

    }

    .floating{
      position:absolute;

      color:rgba(255,255,255,0.15);

      font-size:13px;

      letter-spacing:2px;
    }

    .one{
      top:20%;
      left:10%;
    }

    .two{
      bottom:25%;
      right:10%;
    }

    .three{
      top:70%;
      left:20%;
    }

    @media(max-width:700px){

      h1{
        font-size:38px;
      }

    }

  </style>
</head>

<body>

  <div class="noise"></div>

  <section class="hero">

    <div class="floating one">
      where did this come from?
    </div>

    <div class="floating two">
      corrupted archive
    </div>

    <div class="floating three">
      do not stay too long
    </div>

    <div class="box">

      <h1>YEWKIE'S</h1>

      <div class="subtitle">
        virtual gallery archive
      </div>

      <a href="archive.html" class="enter">
        ENTER THE ARCHIVE
      </a>

    </div>

  </section>

</body>
</html>
