<!DOCTYPE html>
<html>
<head>
  <title>YEWKIE'S Virtual Gallery</title>

  <style>

    body {
      margin: 0;
      background: black;
      color: white;
      font-family: monospace;
      overflow-x: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      background: repeating-radial-gradient(circle,
      rgba(255,255,255,0.08) 1px,
      transparent 2px);
      opacity: 0.08;
      pointer-events: none;
      animation: static 0.2s infinite;
    }

    @keyframes static {
      0% {
        transform: translate(0,0);
      }

      50% {
        transform: translate(-10px,5px);
      }

      100% {
        transform: translate(5px,-10px);
      }
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background:
      radial-gradient(circle,
      #1a1a1a,
      #000);
      padding: 20px;
    }

    h1 {
      font-size: 55px;
      letter-spacing: 8px;
      animation: flicker 2s infinite;
      margin: 0;
    }

    .subtitle {
      color: #888;
      margin-top: 15px;
      font-size: 15px;
      letter-spacing: 3px;
    }

    @keyframes flicker {

      0%,100% {
        opacity: 1;
      }

      45% {
        opacity: 0.4;
      }

      50% {
        opacity: 0.1;
      }

      55% {
        opacity: 0.8;
      }
    }

    .enter {
      margin-top: 40px;
      padding: 15px 35px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
      transition: 0.3s;
      letter-spacing: 3px;
    }

    .enter:hover {
      background: white;
      color: black;
      filter: blur(1px);
    }

    .gallery {
      padding: 60px;
      display: grid;
      grid-template-columns:
      repeat(auto-fit,minmax(230px,1fr));
      gap: 30px;
    }

    .art {
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px;
      background: rgba(255,255,255,0.03);
      transition: 0.3s;
      backdrop-filter: blur(2px);
    }

    .art:hover {
      transform:
      scale(1.05)
      rotate(-1deg);

      filter:
      contrast(130%)
      blur(0.5px);
    }

    .art img {
      width: 100%;
      display: block;
    }

    .caption {
      margin-top: 10px;
      color: #888;
      font-size: 13px;
      letter-spacing: 2px;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #555;
      font-size: 12px;
      letter-spacing: 3px;
    }

    @media(max-width:700px){

      h1{
        font-size:35px;
      }

      .gallery{
        padding:25px;
      }

    }

  </style>
</head>

<body>

  <div class="noise"></div>

  <section class="hero">

    <h1>YEWKIE'S</h1>

    <div class="subtitle">
      virtual gallery archive
    </div>

    <a href="#gallery" class="enter">
      ENTER
    </a>

  </section>

  <section id="gallery" class="gallery">

    <div class="art">
      <img src="art1.jpg">

      <div class="caption">
        lost_file_01
      </div>
    </div>

    <div class="art">
      <img src="art2.jpg">

      <div class="caption">
        memory_02
      </div>
    </div>

    <div class="art">
      <img src="art3.jpg">

      <div class="caption">
        surface_03
      </div>
    </div>

  </section>

  <footer>
    YEWKIE'S Virtual Gallery
  </footer>

</body>
</html>
