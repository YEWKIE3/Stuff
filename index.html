<!DOCTYPE html>
<html>
<head>
  <title>YEWKIE'S Virtual Gallery</title>

  <style>

    body{
      margin:0;
      background:black;
      color:white;
      font-family:monospace;
      overflow:hidden;
    }

    /* VHS SCANLINES */

    .scanlines{
      position:fixed;
      inset:0;

      pointer-events:none;

      z-index:9999;

      background:
      linear-gradient(
      to bottom,

      rgba(255,255,255,0.12) 50%,
      rgba(0,0,0,0.2) 50%
      );

      background-size:100% 5px;

      opacity:0.35;

      animation:scanMove 0.35s linear infinite;
    }

    @keyframes scanMove{

      from{
        background-position:0 0;
      }

      to{
        background-position:0 5px;
      }

    }

    /* CRT FLICKER */

    .crt{
      animation:crtFlicker 0.12s infinite;
    }

    @keyframes crtFlicker{

      0%{
        opacity:1;
      }

      50%{
        opacity:0.96;
      }

      100%{
        opacity:1;
      }

    }

    /* STARTUP SCREEN */

    .startup{

      position:fixed;
      inset:0;

      background:black;

      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;

      z-index:5000;

      animation:fadeOut 1s forwards;
      animation-delay:5s;
    }

    @keyframes fadeOut{

      to{
        opacity:0;
        visibility:hidden;
      }

    }

    .loading-title{

      font-size:32px;

      letter-spacing:6px;

      margin-bottom:30px;

      animation:flicker 2s infinite;
    }

    .loading-bar{

      width:300px;
      height:2px;

      background:#222;

      overflow:hidden;

      position:relative;
    }

    .loading-fill{

      height:100%;
      width:0%;

      background:white;

      animation:load 4s forwards;
    }

    @keyframes load{

      from{
        width:0%;
      }

      to{
        width:100%;
      }

    }

    .percent{

      margin-top:20px;

      color:#888;

      letter-spacing:3px;

      animation:numberChange 4s steps(100) forwards;
    }

    @keyframes flicker{

      0%,100%{
        opacity:1;
      }

      48%{
        opacity:0.5;
      }

      50%{
        opacity:0.1;
      }

      52%{
        opacity:1;
      }

    }

    /* HERO */

    .hero{

      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      text-align:center;

      background:
      radial-gradient(circle at center,
      rgba(100,100,100,0.1),
      transparent 40%),
      linear-gradient(to bottom,
      #050505,
      #000);

      position:relative;

      padding:20px;
    }

    .box{

      border:
      1px solid rgba(255,255,255,0.15);

      padding:60px 40px;

      background:
      rgba(255,255,255,0.03);

      backdrop-filter:blur(3px);

      max-width:700px;
    }

    h1{

      font-size:60px;

      letter-spacing:10px;

      margin:0;

      animation:flicker 2s infinite;
    }

    .subtitle{

      margin-top:20px;

      color:#888;

      letter-spacing:3px;

      font-size:14px;
    }

    .enter{

      display:inline-block;

      margin-top:40px;

      padding:15px 35px;

      border:1px solid white;

      color:white;

      text-decoration:none;

      letter-spacing:3px;

      transition:0.3s;
    }

    .enter:hover{

      background:white;
      color:black;

      filter:blur(1px);
    }

    /* FLOATING TEXT */

    .floating{

      position:absolute;

      color:rgba(255,255,255,0.15);

      font-size:13px;

      letter-spacing:2px;
    }

    .one{
      top:20%;
      left:10%;
    }

    .two{
      bottom:25%;
      right:10%;
    }

    .three{
      top:70%;
      left:20%;
    }

    @media(max-width:700px){

      h1{
        font-size:38px;
      }

      .loading-title{
        font-size:22px;
      }

      .loading-bar{
        width:220px;
      }

    }

  </style>
</head>

<body class="crt">

  <div class="scanlines"></div>

  <!-- STARTUP SCREEN -->

  <div class="startup">

    <div class="loading-title">
      RECOVERING ARCHIVE
    </div>

    <div class="loading-bar">
      <div class="loading-fill"></div>
    </div>

    <div class="percent" id="percent">
      0%
    </div>

  </div>

  <!-- MAIN SCREEN -->

  <section class="hero">

    <div class="floating one">
      where did this come from?
    </div>

    <div class="floating two">
      corrupted archive
    </div>

    <div class="floating three">
      do not stay too long
    </div>

    <div class="box">

      <h1>YEWKIE'S</h1>

      <div class="subtitle">
        virtual gallery archive
      </div>

      <a href="archive.html" class="enter">
        ENTER THE ARCHIVE
      </a>

    </div>

  </section>

  <script>

    let percent = document.getElementById("percent");

    let count = 0;

    let interval = setInterval(() => {

      count++;

      percent.innerText = count + "%";

      if(count >= 100){
        clearInterval(interval);
      }

    }, 40);

  </script>

</body>
</html>
